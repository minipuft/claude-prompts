id: workflow-growth
name: Growth Capture Declaration
type: validation
severity: medium
description: >-
  Validates that the task explicitly declares its learning outcome. Every task
  must state whether it produced novel patterns, confirmed existing ones, or
  found nothing new. Silence is not acceptable.
guidanceFile: guidance.md
pass_criteria:
  - type: content_check
    required_patterns:
      - Growth
  - type: pattern_check
    regex_patterns:
      - 'novel|confirmed|nothing new'
      - 'pattern|learning|captured'

retry_config:
  max_attempts: 1
  improvement_hints: true
  preserve_context: true

activation:
  prompt_categories:
    - workflow
    - implementation
  explicit_request: false

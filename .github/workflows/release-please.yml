name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't create PR/release)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Use PAT to allow releases to trigger downstream workflows (npm-publish).
          # Falls back to github.token for forks (but won't trigger workflow-to-workflow).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Merge manual changelog entries
        if: steps.release.outputs.pr && steps.release.outputs.release_created != 'true'
        env:
          PR_JSON: ${{ steps.release.outputs.pr }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          PR_BRANCH=$(echo "$PR_JSON" | jq -r '.headBranchName')
          gh pr checkout "$PR_BRANCH"
          node scripts/merge-unreleased-changelog.js
          if git diff --quiet CHANGELOG.md; then
            echo "No manual entries to merge"
          else
            git add CHANGELOG.md
            git commit -m "chore(docs): merge manual changelog entries into release"
            git push
          fi

      - name: Summary
        if: always()
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          echo "## Release Please Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$RELEASE_CREATED" == "true" ]]; then
            echo "✅ **Release created**: $TAG_NAME" >> $GITHUB_STEP_SUMMARY
            echo "- Version: $VERSION" >> $GITHUB_STEP_SUMMARY
            echo "- [View Release](https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME)" >> $GITHUB_STEP_SUMMARY
          elif [[ -n "$PR_JSON" ]]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            echo "📝 **Release PR updated**: #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
            echo "- [View PR](https://github.com/${{ github.repository }}/pull/$PR_NUMBER)" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No release action needed" >> $GITHUB_STEP_SUMMARY
          fi
